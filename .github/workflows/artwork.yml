name: Generate GitArtWork

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate GitArtWork
        uses: jasineri/gitartwork@v1
        with:
          user_name: Taj-mim
          text: TAJ MIM

      - name: Push generated files
        uses: jasineri/simple-push-action@v1
        with:
          branch: output
